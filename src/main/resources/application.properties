server.port=8080
spring.application.name=sport-events-api

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JPA / H2 ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:sportevents;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Security ──────────────────────────────────────────────────────────────────
# Override in production via environment variable: APP_SECURITY_API_KEY=<secret>
app.security.api-key=dev-api-key-change-in-production

# ── Pagination defaults ───────────────────────────────────────────────────────
app.pagination.default-page-size=20
app.pagination.max-page-size=100

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── Async / SSE ───────────────────────────────────────────────────────────────
spring.mvc.async.request-timeout=-1
spring.mvc.pathmatch.use-suffix-pattern=false
